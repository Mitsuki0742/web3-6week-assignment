<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌙</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <!-- SEO Meta Tags -->
    <title>Somnus V3 | 次世代睡眠習慣最適化プランナー</title>
    <meta name="description" content="睡眠サイクル可視化、週間プランナー、クロノタイプ診断、バイオリズム・タイムライン、AI睡眠コーチ、環境音プレイヤーを搭載した、最先端の睡眠習慣管理アプリケーション。" />
    <meta name="keywords" content="睡眠, 睡眠サイクル, 起床時間, 睡眠習慣, 睡眠クロノタイプ, 睡眠負債, バイオリズム, 環境音" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    
    <!-- CDN React / ReactDOM / Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>

    <style>
      /* --- DYNAMIC DESIGN SYSTEM & CSS VARIABLES --- */
      :root {
        --font-heading: 'Outfit', sans-serif;
        --font-body: 'Plus Jakarta Sans', sans-serif;
        
        --bg-main: #02040d;
        --bg-card: rgba(8, 12, 30, 0.75);
        --bg-card-hover: rgba(14, 20, 50, 0.9);
        --bg-input: rgba(4, 6, 16, 0.8);
        
        --accent-primary: #8b5cf6;       /* Cosmic Violet */
        --accent-primary-glow: rgba(139, 92, 246, 0.4);
        --accent-secondary: #06b6d4;     /* Cyberspace Cyan */
        --accent-secondary-glow: rgba(6, 182, 212, 0.4);
        --accent-highlight: #ec4899;     /* Starburst Pink */
        --accent-warning: #f59e0b;       /* Solar Amber */
        --accent-danger: #ef4444;        /* Supernova Red */
        --accent-success: #10b981;       /* Aurora Green */

        --text-main: #f8fafc;
        --text-sub: #94a3b8;
        --text-muted: #475569;
        
        --border-color: rgba(255, 255, 255, 0.08);
        --border-focus: rgba(139, 92, 246, 0.55);
        --shadow-lg: 0 16px 48px -12px rgba(0, 0, 0, 0.9);
        --shadow-glow: 0 0 35px rgba(139, 92, 246, 0.12);
        
        --radius-lg: 24px;
        --radius-md: 16px;
        --radius-sm: 10px;
        
        --transition-bounce: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      /* Base Style Reset */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        background-color: var(--bg-main);
        color: var(--text-main);
        font-family: var(--font-body);
        min-height: 100vh;
        line-height: 1.6;
        overflow-x: hidden;
        background-image: 
          radial-gradient(circle at 10% 15%, rgba(139, 92, 246, 0.15) 0%, transparent 45%),
          radial-gradient(circle at 90% 85%, rgba(6, 182, 212, 0.12) 0%, transparent 45%),
          radial-gradient(circle at 50% 50%, rgba(236, 72, 153, 0.07) 0%, transparent 60%);
        background-attachment: fixed;
      }

      /* Animated space background with stars */
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: 
          radial-gradient(1px 1px at 40px 60px, #fff, rgba(0,0,0,0)),
          radial-gradient(1px 1px at 200px 200px, rgba(255,255,255,0.7), rgba(0,0,0,0)),
          radial-gradient(1.5px 1.5px at 350px 100px, #fff, rgba(0,0,0,0)),
          radial-gradient(1px 1px at 500px 400px, rgba(255,255,255,0.9), rgba(0,0,0,0)),
          radial-gradient(2px 2px at 750px 300px, #fff, rgba(0,0,0,0)),
          radial-gradient(1.5px 1.5px at 900px 600px, rgba(255,255,255,0.8), rgba(0,0,0,0)),
          radial-gradient(1px 1px at 1100px 180px, #fff, rgba(0,0,0,0)),
          radial-gradient(2.5px 2.5px at 1300px 700px, rgba(255,255,255,0.9), rgba(0,0,0,0));
        background-size: 1400px 800px;
        opacity: 0.4;
        pointer-events: none;
        z-index: 0;
        animation: starDrift 25s ease-in-out infinite alternate;
      }

      @keyframes starDrift {
        0% { opacity: 0.3; transform: scale(1) translateY(0); }
        100% { opacity: 0.5; transform: scale(1.06) translateY(-15px); }
      }

      .app-container {
        position: relative;
        z-index: 1;
        max-width: 1240px;
        margin: 0 auto;
        padding: 40px 24px;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      header {
        text-align: center;
        margin-bottom: 35px;
      }

      .brand {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 14px;
        margin-bottom: 8px;
      }

      .brand-logo {
        position: relative;
        width: 48px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
        box-shadow: 0 0 20px var(--accent-primary-glow);
        animation: logoGlow 4s ease-in-out infinite alternate;
      }

      @keyframes logoGlow {
        0% { transform: translateY(0) scale(1); box-shadow: 0 0 15px var(--accent-primary-glow); }
        100% { transform: translateY(-4px) scale(1.05); box-shadow: 0 0 25px var(--accent-secondary-glow); }
      }

      h1 {
        font-family: var(--font-heading);
        font-weight: 800;
        font-size: 2.8rem;
        background: linear-gradient(135deg, #ffffff 15%, var(--accent-primary) 65%, var(--accent-secondary) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: -0.02em;
        text-shadow: 0 10px 30px rgba(0,0,0,0.5);
      }

      .subtitle {
        color: var(--text-sub);
        font-size: 1.05rem;
        font-weight: 400;
        max-width: 600px;
        margin: 8px auto 0;
      }

      /* Navigation Tabs */
      .nav-tabs {
        display: flex;
        justify-content: center;
        gap: 12px;
        margin-bottom: 35px;
        padding: 6px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 50px;
        align-self: center;
        max-width: 100%;
        overflow-x: auto;
      }

      .tab-btn {
        background: transparent;
        border: none;
        color: var(--text-sub);
        padding: 12px 24px;
        font-family: var(--font-heading);
        font-weight: 600;
        font-size: 0.95rem;
        border-radius: 50px;
        cursor: pointer;
        transition: var(--transition-smooth);
        display: flex;
        align-items: center;
        gap: 8px;
        white-space: nowrap;
      }

      .tab-btn:hover {
        color: #fff;
        background: rgba(255, 255, 255, 0.06);
      }

      .tab-btn.active {
        color: #fff;
        background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
        box-shadow: 0 4px 15px rgba(139, 92, 246, 0.35);
      }

      /* Grid Layouts */
      .main-grid {
        display: grid;
        grid-template-columns: 1.3fr 1fr;
        gap: 28px;
        margin-bottom: 40px;
      }

      .single-column {
        display: grid;
        grid-template-columns: 1fr;
        gap: 28px;
        margin-bottom: 40px;
      }

      @media (max-width: 968px) {
        .main-grid {
          grid-template-columns: 1fr;
        }
      }

      /* Card UI Base */
      .glass-card {
        background: var(--bg-card);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-lg), var(--shadow-glow);
        padding: 30px;
        transition: var(--transition-smooth);
        position: relative;
        overflow: hidden;
      }

      .glass-card:hover {
        background: var(--bg-card-hover);
        border-color: rgba(255, 255, 255, 0.14);
        box-shadow: var(--shadow-lg), 0 0 35px rgba(139, 92, 246, 0.18);
      }

      /* Form elements */
      .input-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 20px;
      }

      .input-label {
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--text-sub);
        display: flex;
        align-items: center;
        gap: 6px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .input-field {
        background: var(--bg-input);
        border: 1px solid var(--border-color);
        color: var(--text-main);
        padding: 14px 16px;
        border-radius: var(--radius-md);
        font-family: var(--font-body);
        font-size: 1rem;
        transition: var(--transition-smooth);
        width: 100%;
      }

      .input-field:focus {
        outline: none;
        border-color: var(--accent-primary);
        box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.25);
      }

      /* Range sliders */
      .range-slider {
        -webkit-appearance: none;
        width: 100%;
        height: 6px;
        border-radius: 5px;
        background: rgba(255,255,255,0.1);
        outline: none;
        transition: background 0.3s;
      }

      .range-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: var(--accent-secondary);
        cursor: pointer;
        box-shadow: 0 0 10px rgba(6, 182, 212, 0.5);
        transition: transform 0.1s;
      }

      .range-slider::-webkit-slider-thumb:hover {
        transform: scale(1.2);
      }

      /* Buttons */
      .btn-primary {
        background: linear-gradient(135deg, var(--accent-primary) 0%, #7c3aed 100%);
        color: #fff;
        border: none;
        padding: 14px 28px;
        font-family: var(--font-heading);
        font-weight: 700;
        font-size: 1rem;
        border-radius: var(--radius-md);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: var(--transition-bounce);
        box-shadow: 0 6px 20px rgba(139, 92, 246, 0.35);
      }

      .btn-primary:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 25px rgba(139, 92, 246, 0.55);
      }

      .btn-secondary {
        background: rgba(255, 255, 255, 0.05);
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.08);
        padding: 12px 24px;
        font-family: var(--font-heading);
        font-weight: 600;
        font-size: 0.95rem;
        border-radius: var(--radius-md);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: var(--transition-smooth);
      }

      .btn-secondary:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: rgba(255, 255, 255, 0.2);
      }

      /* Section title */
      .section-title {
        font-family: var(--font-heading);
        font-size: 1.4rem;
        font-weight: 700;
        margin-bottom: 24px;
        display: flex;
        align-items: center;
        gap: 10px;
        color: #fff;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        padding-bottom: 12px;
      }

      /* STATS PANEL ON HEADER */
      .user-status-strip {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin-bottom: 30px;
        flex-wrap: wrap;
      }

      .status-pill {
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.06);
        padding: 8px 16px;
        border-radius: 50px;
        font-size: 0.85rem;
        color: var(--text-sub);
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .status-pill strong {
        color: #fff;
      }

      /* SLEEP CYCLE WAVE VISUALIZER */
      .wave-container {
        margin: 20px 0;
        position: relative;
        background: rgba(0, 0, 0, 0.3);
        border-radius: var(--radius-md);
        padding: 20px;
        border: 1px solid rgba(255, 255, 255, 0.03);
      }

      .wave-title {
        font-size: 0.8rem;
        color: var(--text-sub);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 12px;
        display: flex;
        justify-content: space-between;
      }

      .sleep-stage-wave {
        width: 100%;
        height: 120px;
        stroke-dasharray: 1000;
        stroke-dashoffset: 0;
      }

      .wave-path-nonrem {
        stroke: url(#waveGradient);
        fill: none;
        stroke-width: 3;
      }

      .wave-grid-line {
        stroke: rgba(255, 255, 255, 0.06);
        stroke-width: 1;
        stroke-dasharray: 4 4;
      }

      .wave-marker-label {
        font-size: 9px;
        fill: var(--text-sub);
      }

      /* ROUTINE CHECKLIST & COUNTDOWN */
      .countdown-banner {
        background: linear-gradient(135deg, rgba(236, 72, 153, 0.15) 0%, rgba(139, 92, 246, 0.15) 100%);
        border: 1px solid rgba(236, 72, 153, 0.3);
        border-radius: var(--radius-md);
        padding: 16px;
        margin-bottom: 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .countdown-info {
        display: flex;
        flex-direction: column;
      }

      .countdown-val {
        font-family: var(--font-heading);
        font-size: 1.8rem;
        font-weight: 800;
        color: var(--accent-highlight);
        text-shadow: 0 0 10px rgba(236, 72, 153, 0.4);
      }

      .routine-list {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
        margin-top: 15px;
      }

      .routine-item {
        display: flex;
        align-items: center;
        gap: 12px;
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.04);
        padding: 12px 16px;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: var(--transition-smooth);
      }

      .routine-item:hover {
        background: rgba(255, 255, 255, 0.05);
        border-color: rgba(255, 255, 255, 0.08);
      }

      .routine-item.completed {
        background: rgba(16, 185, 129, 0.08);
        border-color: rgba(16, 185, 129, 0.2);
      }

      .routine-item input[type="checkbox"] {
        width: 18px;
        height: 18px;
        accent-color: var(--accent-success);
        cursor: pointer;
      }

      .routine-text {
        font-size: 0.9rem;
        color: var(--text-main);
        flex-grow: 1;
      }

      .routine-item.completed .routine-text {
        text-decoration: line-through;
        color: var(--text-sub);
      }

      .routine-score-bonus {
        font-size: 0.75rem;
        font-weight: 700;
        color: var(--accent-success);
        background: rgba(16, 185, 129, 0.15);
        padding: 2px 8px;
        border-radius: 20px;
      }

      /* BIORHYTHM TIMELINE VISUAL */
      .timeline-container {
        display: flex;
        flex-direction: column;
        gap: 16px;
        margin-top: 20px;
        padding: 20px;
        background: rgba(0, 0, 0, 0.2);
        border-radius: var(--radius-md);
        border: 1px solid rgba(255, 255, 255, 0.03);
      }

      .timeline-track {
        position: relative;
        height: 8px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 4px;
        margin: 30px 10px 40px 10px;
      }

      .timeline-node {
        position: absolute;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--accent-secondary);
        border: 3px solid var(--bg-main);
        box-shadow: 0 0 10px var(--accent-secondary);
        cursor: pointer;
        transition: transform 0.2s ease;
      }

      .timeline-node:hover {
        transform: translate(-50%, -50%) scale(1.3);
      }

      .timeline-node-label {
        position: absolute;
        top: -24px;
        transform: translateX(-50%);
        font-size: 0.75rem;
        font-weight: 700;
        white-space: nowrap;
        color: #fff;
      }

      .timeline-node-desc {
        position: absolute;
        top: 20px;
        transform: translateX(-50%);
        font-size: 0.7rem;
        color: var(--text-sub);
        white-space: nowrap;
        text-align: center;
      }

      /* CHRONOTYPE DIAGNOSIS QUIZ */
      .quiz-container {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .quiz-q-num {
        font-size: 0.8rem;
        color: var(--accent-secondary);
        font-weight: 700;
        text-transform: uppercase;
      }

      .quiz-q-text {
        font-size: 1.2rem;
        font-weight: 700;
        margin-bottom: 8px;
      }

      .quiz-options {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .quiz-option-btn {
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.06);
        color: var(--text-main);
        padding: 14px 20px;
        border-radius: var(--radius-md);
        text-align: left;
        cursor: pointer;
        font-family: var(--font-body);
        font-size: 0.95rem;
        transition: var(--transition-smooth);
      }

      .quiz-option-btn:hover {
        background: rgba(139, 92, 246, 0.1);
        border-color: var(--accent-primary);
        transform: translateX(4px);
      }

      .character-result-card {
        background: linear-gradient(135deg, rgba(139, 92, 246, 0.15) 0%, rgba(6, 182, 212, 0.15) 100%);
        border: 1px solid rgba(139, 92, 246, 0.3);
        border-radius: var(--radius-lg);
        padding: 30px;
        text-align: center;
        animation: scaleUp 0.4s ease-out;
      }

      @keyframes scaleUp {
        from { transform: scale(0.95); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
      }

      .character-emoji {
        font-size: 5rem;
        line-height: 1;
        margin-bottom: 15px;
        animation: characterFloat 3s ease-in-out infinite;
      }

      @keyframes characterFloat {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }

      .character-name {
        font-family: var(--font-heading);
        font-size: 2rem;
        font-weight: 800;
        color: #fff;
        margin-bottom: 8px;
      }

      .character-tag {
        display: inline-block;
        padding: 4px 16px;
        border-radius: 50px;
        background: rgba(255,255,255,0.08);
        font-size: 0.85rem;
        font-weight: 600;
        margin-bottom: 20px;
      }

      .character-desc {
        font-size: 0.95rem;
        color: var(--text-sub);
        line-height: 1.6;
        margin-bottom: 24px;
      }

      /* WEEKLY PLANNER & SLEEP DEBT */
      .weekly-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 12px;
        margin-bottom: 24px;
      }

      @media (max-width: 768px) {
        .weekly-grid {
          grid-template-columns: repeat(4, 1fr);
        }
      }
      @media (max-width: 480px) {
        .weekly-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      .day-card {
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: var(--radius-md);
        padding: 14px;
        text-align: center;
        cursor: pointer;
        transition: var(--transition-smooth);
      }

      .day-card:hover {
        background: rgba(255, 255, 255, 0.06);
        border-color: rgba(255, 255, 255, 0.15);
      }

      .day-card.active {
        background: rgba(139, 92, 246, 0.15);
        border-color: var(--accent-primary);
        box-shadow: 0 0 15px rgba(139, 92, 246, 0.15);
      }

      .day-name {
        font-weight: 700;
        font-size: 0.95rem;
        margin-bottom: 4px;
      }

      .day-time {
        font-size: 0.8rem;
        color: var(--text-sub);
      }

      /* Sleep Debt Indicator */
      .debt-meter-card {
        background: linear-gradient(135deg, rgba(5,7,20,0.8) 0%, rgba(13,17,39,0.9) 100%);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: var(--radius-md);
        padding: 20px;
        margin-bottom: 24px;
      }

      .debt-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }

      .debt-bar-bg {
        height: 12px;
        background: rgba(255, 255, 255, 0.06);
        border-radius: 10px;
        overflow: hidden;
        position: relative;
      }

      .debt-bar-fg {
        height: 100%;
        background: linear-gradient(90deg, var(--accent-success), var(--accent-warning), var(--accent-danger));
        transition: width 0.5s ease;
      }

      /* AMBIENT SOUND GENERATOR */
      .ambient-card {
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.04);
        border-radius: var(--radius-md);
        padding: 20px;
        margin-bottom: 24px;
      }

      .ambient-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
        gap: 12px;
        margin-top: 14px;
      }

      .ambient-btn {
        background: rgba(255, 255, 255, 0.02);

      // --- HELPER TIME UTILITIES ---
      const timeToMinutes = (timeStr) => {
        const [hours, minutes] = timeStr.split(':').map(Number);
        return hours * 60 + minutes;
      };

      const minutesToTime = (totalMinutes) => {
        let normalized = totalMinutes % 1440;
        if (normalized < 0) normalized += 1440;
        const hours = Math.floor(normalized / 60);
        const minutes = Math.round(normalized % 60);
        return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}`;
      };

      // --- CHRONOTYPE SPECIFICATIONS ---
      const CHRONOTYPES = {

      // --- 1. SLEEP CYCLE VISUAL WAVE & RECOM TIMES ---
      function SleepCycleVisualizer({ wakeUpTime, bedtime, sleepDuration }) {
        const pathData = useMemo(() => {
          const cycles = Math.round(sleepDuration / 1.5) || 5;
          const points = [];
          const width = 1000;
          const height = 120;
          
          points.push(`M 0 ${height * 0.1}`);
          
          for (let i = 0; i < cycles; i++) {
            const startX = (i / cycles) * width;
            const endX = ((i + 1) / cycles) * width;
            const cycleWidth = endX - startX;
            
            const deepX = startX + cycleWidth * 0.35;
            const deepY = height * 0.9;
            
            const remX = startX + cycleWidth * 0.8;
            const remY = height * 0.25;
            
            const nextX = endX;
            const nextY = height * 0.15;
            
            points.push(`C ${startX + cycleWidth * 0.15} ${height * 0.4}, ${deepX - cycleWidth * 0.1} ${deepY}, ${deepX} ${deepY}`);
            points.push(`C ${deepX + cycleWidth * 0.15} ${deepY}, ${remX - cycleWidth * 0.1} ${remY}, ${remX} ${remY}`);
            points.push(`C ${remX + cycleWidth * 0.1} ${remY}, ${nextX - cycleWidth * 0.1} ${nextY}, ${nextX} ${nextY}`);
          }
          
          return points.join(' ');
        }, [sleepDuration]);

        const suggestedTimes = useMemo(() => {
          const wakeMin = timeToMinutes(wakeUpTime);
          const fallAsleepMin = 15;
          
          return [3, 4, 5, 6].map(cycles => {
            const duration = cycles * 1.5;
            const bedtimeMin = wakeMin - (duration * 60) - fallAsleepMin;
            return {
              cycles,
              duration,
              time: minutesToTime(bedtimeMin)
            };
          }).reverse();
        }, [wakeUpTime]);

        return (

                  <stop offset="50%" stopColor="var(--accent-highlight)" />
                  <stop offset="100%" stopColor="var(--accent-secondary)" />

              <line x1="0" y1="15" x2="1000" y2="15" className="wave-grid-line" />

              <line x1="0" y1="60" x2="1000" y2="60" className="wave-grid-line" />
              <text x="5" y="55" className="wave-marker-label">浅い睡眠</text>
              
              <line x1="0" y1="108" x2="1000" y2="108" className="wave-grid-line" />
              <text x="5" y="103" className="wave-marker-label">深い睡眠 (徐波睡眠)</text>

              <path d={pathData} className="wave-path-nonrem" />
            </svg>

            <div style={{ marginTop: '20px' }}>
              <div style={{ fontSize: '0.85rem', fontWeight: 'bold', marginBottom: '10px' }}>

      // --- 2. BIORHYTHM TIMELINE COMPONENT ---
      function BiorhythmTimeline({ chronotype }) {

      // --- 3. COSMIC AMBIENT SOUND GENERATOR COMPONENT ---
      function AmbientSoundGenerator() {
        const [playing, setPlaying] = useState(null); // 'space' | 'delta' | 'pink'
        const audioCtxRef = useRef(null);
        const sourceNodesRef = useRef([]);

        const stopAllSounds = () => {
          sourceNodesRef.current.forEach(node => {
            try { node.stop(); } catch(e) {}
          });
          sourceNodesRef.current = [];
          if (audioCtxRef.current && audioCtxRef.current.state !== 'closed') {
            audioCtxRef.current.suspend();
          }
          setPlaying(null);
        };

        const initAudio = () => {
          if (!audioCtxRef.current) {
            audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
          }
          if (audioCtxRef.current.state === 'suspended') {
            audioCtxRef.current.resume();
          }
        };

        const playSpaceDrone = () => {
          stopAllSounds();
          initAudio();
          const ctx = audioCtxRef.current;
          
          // Cosmic sweep synth
          const osc1 = ctx.createOscillator();
          const osc2 = ctx.createOscillator();
          const filter = ctx.createBiquadFilter();
          const amp = ctx.createGain();

          osc1.type = 'sawtooth';
          osc1.frequency.setValueAtTime(55, ctx.currentTime); // A1
          
          osc2.type = 'triangle';
          osc2.frequency.setValueAtTime(55.5, ctx.currentTime); // slightly detuned

          filter.type = 'lowpass';
          filter.frequency.setValueAtTime(120, ctx.currentTime);
          
          // Sweep the filter frequency
          const lfo = ctx.createOscillator();
          const lfoGain = ctx.createGain();
          lfo.frequency.value = 0.08; // very slow sweep
          lfoGain.gain.value = 40;
          lfo.connect(lfoGain);
          lfoGain.connect(filter.frequency);

          amp.gain.setValueAtTime(0.12, ctx.currentTime);

          osc1.connect(filter);
          osc2.connect(filter);
          filter.connect(amp);
          amp.connect(ctx.destination);

          lfo.start();
          osc1.start();
          osc2.start();

          sourceNodesRef.current = [osc1, osc2, lfo];
          setPlaying('space');
        };

        const playDeltaBeats = () => {
          stopAllSounds();
          initAudio();
          const ctx = audioCtxRef.current;

          // Binaural beats (100Hz Left, 104Hz Right for a 4Hz Delta wave sleep entrainment)
          const oscL = ctx.createOscillator();
          const oscR = ctx.createOscillator();
          const pannerL = ctx.createStereoPanner ? ctx.createStereoPanner() : null;
          const pannerR = ctx.createStereoPanner ? ctx.createStereoPanner() : null;
          const amp = ctx.createGain();

          oscL.type = 'sine';
          oscL.frequency.value = 100;
          
          oscR.type = 'sine';
          oscR.frequency.value = 104; // 4Hz delta difference

          amp.gain.setValueAtTime(0.08, ctx.currentTime);

          if (pannerL && pannerR) {
            pannerL.pan.value = -1;
            pannerR.pan.value = 1;
            oscL.connect(pannerL).connect(amp);
            oscR.connect(pannerR).connect(amp);
          } else {
            oscL.connect(amp);
            oscR.connect(amp);
          }

          amp.connect(ctx.destination);
          
          oscL.start();
          oscR.start();

          sourceNodesRef.current = [oscL, oscR];
          setPlaying('delta');
        };

        const playPinkNoise = () => {
          stopAllSounds();
          initAudio();
          const ctx = audioCtxRef.current;

          const bufferSize = 4 * ctx.sampleRate;
          const noiseBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
          const output = noiseBuffer.getChannelData(0);
          
          let b0, b1, b2, b3, b4, b5, b6;
          b0 = b1 = b2 = b3 = b4 = b5 = b6 = 0.0;
          
          for (let i = 0; i < bufferSize; i++) {
            const white = Math.random() * 2 - 1;
            b0 = 0.99886 * b0 + white * 0.0555179;
            b1 = 0.99332 * b1 + white * 0.0750759;
            b2 = 0.96900 * b2 + white * 0.1538520;
            b3 = 0.86650 * b3 + white * 0.3104856;
            b4 = 0.55000 * b4 + white * 0.5329522;
            b5 = -0.7616 * b5 - white * 0.0168980;
            output[i] = b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362;
            output[i] *= 0.11; // rough volume adjustment
            b6 = white * 0.115926;
          }

          const whiteNoiseNode = ctx.createBufferSource();
          whiteNoiseNode.buffer = noiseBuffer;
          whiteNoiseNode.loop = true;

          const amp = ctx.createGain();
          amp.gain.setValueAtTime(0.12, ctx.currentTime);

          whiteNoiseNode.connect(amp).connect(ctx.destination);
          whiteNoiseNode.start();

          sourceNodesRef.current = [whiteNoiseNode];
          setPlaying('pink');
        };

        useEffect(() => {
          return () => {
            sourceNodesRef.current.forEach(node => {
              try { node.stop(); } catch(e) {}
            });
          };
        }, []);

        return (
          <div className="ambient-card">
            <h3 style={{ fontSize: '0.95rem', fontWeight: 'bold', display: 'flex', alignItems: 'center', gap: '6px' }}>
              <Icons.Volume2 size={16} />
              就寝用マインドフル環境音
            </h3>
            <p style={{ fontSize: '0.75rem', color: 'var(--text-sub)', marginTop: '4px' }}>
              Web Audio APIにより脳をデルタ波やリラックス状態へ導くシグナルを生成します。
            </p>
            <div className="ambient-grid">
              <button 
                onClick={playing === 'space' ? stopAllSounds : playSpaceDrone} 
                className={`ambient-btn ${playing === 'space' ? 'active' : ''}`}
              >
                <span>🪐</span>
                <strong>宇宙のハミング</strong>
              </button>
              <button 
                onClick={playing === 'delta' ? stopAllSounds : playDeltaBeats} 
                className={`ambient-btn ${playing === 'delta' ? 'active' : ''}`}
              >
                <span>🧠</span>
                <strong>デルタ睡眠波</strong>
              </button>
              <button 
                onClick={playing === 'pink' ? stopAllSounds : playPinkNoise} 
                className={`ambient-btn ${playing === 'pink' ? 'active' : ''}`}
              >
                <span>🌧️</span>
                <strong>ピンクノイズ</strong>
              </button>
            </div>
            {playing && (
              <button 
                onClick={stopAllSounds} 
                className="btn-secondary" 
                style={{ width: '100%', marginTop: '12px', padding: '8px', fontSize: '0.8rem' }}
              >
                環境音を停止する
              </button>
            )}
          </div>
        );
      }

      // --- 4. AI SLEEP COACH INSIGHTS COMPONENT ---
      function AISleepCoach({ logs, weeklyData, chronotype }) {
        const insights = useMemo(() => {
          const typeInfo = CHRONOTYPES[chronotype] || CHRONOTYPES.bear;
          
          // Calculate average sleep
          const validLogs = logs.filter(l => l.duration > 0);
          const avgDuration = validLogs.length > 0
            ? parseFloat((validLogs.reduce((acc, curr) => acc + curr.duration, 0) / validLogs.length).toFixed(1))
            : typeInfo.idealSleep - 0.5; // fallback standard

          const avgSatisfaction = validLogs.length > 0
            ? Math.round(validLogs.reduce((acc, curr) => acc + curr.satisfaction, 0) / validLogs.length)
            : 75;

          // Sleep debt calculation
          let totalSleepDebt = 0;
          Object.values(weeklyData).forEach(day => {
            const ideal = typeInfo.idealSleep;
            const diff = ideal - day.sleepDuration;
            totalSleepDebt += diff;
          });

          const list = [];

            list.push({

            });

          // Insight 3: Personalized Chronotype Tip
          if (chronotype === 'wolf') {
            list.push({
              type: 'info',
              text: `オオカミ型は夜間の覚醒度が高いため、16時以降のカフェイン（コーヒーなど）の摂取を控えるだけで、入眠速度が劇的に改善します。`
            });

            list.push({
              type: 'info',
              text: `ライオン型は夕方の早い段階でパワー不足になりやすいため、15時頃の短いパワーナップ（15分程度の仮眠）を入れることで夜のパフォーマンスが維持されます。`
            });
          } else if (chronotype === 'dolphin') {
            list.push({
              type: 'info',
              text: `イルカ型は交感神経が優位になりやすいデリケートな特性があります。就寝の90分前に温かい入浴を済ませて深部体温を下げておくことが、中途覚醒を防ぐ鍵です。`
            });
          } else {
            list.push({
              type: 'info',
              text: `クマ型は昼食後（14:00頃）にスランプが起きやすいため、この時間は単純作業を割り当てるか、軽く歩いてセロトニンを分泌させると夜の安定睡眠につながります。`
            });

      // --- 6. COUNTDOWN & ROUTINE COMPONENT ---
      function SleepRoutine({ bedtime, onAddBonusScore }) {
        const [timeRemaining, setTimeRemaining] = useState('');
        const [routines, setRoutines] = useState([
          { id: '1', text: 'スマホ・パソコンの画面をオフにする (30分前)', completed: false, bonus: 10 },
          { id: '2', text: 'コップ1杯の白湯または水を飲む', completed: false, bonus: 5 },
          { id: '3', text: '軽いストレッチをして筋肉をほぐす (5分間)', completed: false, bonus: 5 },
          { id: '4', text: '部屋の明かりを暖色系の暗めにする', completed: false, bonus: 5 }
        ]);

        useEffect(() => {
          const updateTimer = () => {
            const now = new Date();
            const [bHours, bMinutes] = bedtime.split(':').map(Number);
            
            let targetDate = new Date();
            targetDate.setHours(bHours, bMinutes, 0, 0);

            if (targetDate < now) {
              targetDate.setDate(targetDate.getDate() + 1);
            }

            const diffMs = targetDate - now;
            const diffHours = Math.floor(diffMs / (1000 * 60 * 60));
            const diffMin = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));
            const diffSec = Math.floor((diffMs % (1000 * 60)) / 1000);

            if (diffMs > 12 * 60 * 60 * 1000) {
              setTimeRemaining(`本日も快適に眠りましょう (${bedtime})`);
            } else {
              setTimeRemaining(`就寝準備まであと ${diffHours}時間${diffMin}分${diffSec}秒`);
            }
          };

          const interval = setInterval(updateTimer, 1000);
          updateTimer();

          return () => clearInterval(interval);
        }, [bedtime]);

        const toggleRoutine = (id) => {
          setRoutines(prev => prev.map(r => {
            if (r.id === id) {
              const nextStatus = !r.completed;
              if (nextStatus) {
                onAddBonusScore(r.bonus);
              } else {
                onAddBonusScore(-r.bonus);
              }
              return { ...r, completed: nextStatus };
            }
            return r;
          }));
        };

        return (
          <div className="glass-card">
            <h2 className="section-title">
              <Icons.Coffee size={22} />
              就寝前ルーティン & カウントダウン
            </h2>

            <div className="countdown-banner">
              <div className="countdown-info">
                <span style={{ fontSize: '0.8rem', textTransform: 'uppercase', color: 'rgba(255,255,255,0.7)' }}>就寝目標: {bedtime}</span>
                <span style={{ fontSize: '0.9rem', color: '#fff' }}>{timeRemaining}</span>
              </div>
              <Icons.Moon className="brand-icon" size={24} style={{ color: 'var(--accent-highlight)' }} />
            </div>

            <p style={{ fontSize: '0.85rem', color: 'var(--text-sub)', marginBottom: '12px' }}>
              就寝に向けた良い習慣をチェックすると、睡眠スコア（充足率）にボーナスポイントが加算されます！
            </p>

            <div className="routine-list">
              {routines.map(r => (
                <div 
                  key={r.id} 
                  className={`routine-item ${r.completed ? 'completed' : ''}`}
                  onClick={() => toggleRoutine(r.id)}
                >
                  <input 
                    type="checkbox" 
                    checked={r.completed} 
                    onChange={() => {}}
                  />
                  <span className="routine-text">{r.text}</span>
                  <span className="routine-score-bonus">+{r.bonus}%</span>
                </div>
              ))}
            </div>
          </div>
        );
      }

      // --- 7. WEEKLY PLANNER COMPONENT ---
      function WeeklyPlanner({ weeklyData, activeDay, onSetActiveDay, onUpdateDayData, chronotype }) {
        const weekdays = ['月', '火', '水', '木', '金', '土', '日'];
        const currentDayData = weeklyData[activeDay];
        const typeInfo = CHRONOTYPES[chronotype] || CHRONOTYPES.bear;

        const handleTimeChange = (val) => {
          onUpdateDayData(activeDay, { wakeUpTime: val });
        };

        const handleDurationChange = (val) => {
          onUpdateDayData(activeDay, { sleepDuration: val });
        };

        const totalSleepDebt = useMemo(() => {
          let debt = 0;
          Object.values(weeklyData).forEach(day => {
            const ideal = typeInfo.idealSleep;
            const diff = ideal - day.sleepDuration;
            debt += diff;
          });
          return parseFloat(debt.toFixed(1));
        }, [weeklyData, chronotype]);

        const debtPercentage = Math.min(Math.max((totalSleepDebt + 5) * 10, 0), 100);

        return (
          <div className="glass-card">
            <h2 className="section-title">
              <Icons.Calendar size={22} />
              週間睡眠プランナー & 睡眠負債
            </h2>

            <div className="debt-meter-card">
              <div className="debt-header">
                <div>
                  <span style={{ fontSize: '0.85rem', color: 'var(--text-sub)' }}>累積睡眠負債 ({typeInfo.name}基準)</span>
                  <div style={{ fontSize: '1.4rem', fontWeight: 'bold' }}>
                    {totalSleepDebt > 0 ? `${totalSleepDebt} 時間 不足` : totalSleepDebt < 0 ? `${Math.abs(totalSleepDebt)} 時間 貯金中` : '完璧なバランス'}
                  </div>
                </div>
                <Icons.Activity size={24} style={{ color: totalSleepDebt > 0 ? 'var(--accent-warning)' : 'var(--accent-success)' }} />
              </div>
              <div className="debt-bar-bg">
                <div className="debt-bar-fg" style={{ width: `${debtPercentage}%` }} />
              </div>
              <p style={{ fontSize: '0.75rem', color: 'var(--text-sub)', marginTop: '8px' }}>
                {totalSleepDebt > 2 ? '⚠️ 睡眠負債が溜まっています。体内リズムの乱れを防ぐため睡眠時間を確保しましょう。' : '良好な睡眠バランスが維持できています。この調子をキープしましょう。'}
              </p>
            </div>

            <div className="weekly-grid">
              {weekdays.map((day, idx) => {
                const dayData = weeklyData[idx];
                return (
                  <div 
                    key={idx} 
                    className={`day-card ${activeDay === idx ? 'active' : ''}`}
                    onClick={() => onSetActiveDay(idx)}
                  >
                    <div className="day-name">{day}曜</div>
                    <div className="day-time">{dayData.wakeUpTime}</div>
                    <div style={{ fontSize: '0.7rem', color: 'var(--accent-secondary)' }}>{dayData.sleepDuration}h</div>
                  </div>
                );
              })}
            </div>

            <div style={{ background: 'rgba(255,255,255,0.01)', border: '1px solid rgba(255,255,255,0.04)', borderRadius: '12px', padding: '16px' }}>
              <div style={{ fontWeight: 'bold', marginBottom: '14px', fontSize: '0.95rem' }}>
                {weekdays[activeDay]}曜日の睡眠ターゲット設定
              </div>
              
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px' }}>
                <div className="input-group">
                  <label className="input-label">起床予定時刻</label>
                  <input
                    type="time"
                    value={currentDayData.wakeUpTime}
                    onChange={(e) => handleTimeChange(e.target.value)}
                    className="input-field"
                  />
                </div>

                <div className="input-group">
                  <label className="input-label">目標睡眠時間 ({currentDayData.sleepDuration}h)</label>
                  <input
                    type="range"
                    min="5"
                    max="9.5"
                    step="0.5"
                    value={currentDayData.sleepDuration}
                    onChange={(e) => handleDurationChange(parseFloat(e.target.value))}
                    className="range-slider"
                    style={{ marginTop: '14px' }}
                  />
                </div>
              </div>
            </div>
          </div>
        );
      }

      // --- 8. LOGS & INTERACTIVE GRAPH COMPONENT ---
      function SleepLogs({ logs, onAddLog, onDeleteLog }) {
        const [sleepTime, setSleepTime] = useState('23:00');
        const [wakeTime, setWakeTime] = useState('06:30');
        const [satisfaction, setSatisfaction] = useState(80);

        const handleAdd = (e) => {
          e.preventDefault();
          
          const sMin = timeToMinutes(sleepTime);
          const wMin = timeToMinutes(wakeTime);
          
          let diffMin = wMin - sMin;
          if (diffMin < 0) diffMin += 1440; // overnight
          
          const duration = parseFloat((diffMin / 60).toFixed(1));

          onAddLog({
            id: Date.now().toString(),
            date: new Date().toLocaleDateString('ja-JP', { month: '2-digit', day: '2-digit' }),
            sleepTime,
            wakeTime,
            duration,
            satisfaction
          });
        };

        const graphData = useMemo(() => {
          const baseData = Array(7).fill(null).map((_, i) => {
            const d = new Date();
            d.setDate(d.getDate() - (6 - i));
            return {
              date: d.toLocaleDateString('ja-JP', { month: '2-digit', day: '2-digit' }),
              duration: 0,
              satisfaction: 0
            };
          });

          logs.forEach(log => {
            const found = baseData.find(b => b.date === log.date);
            if (found) {
              found.duration = log.duration;
              found.satisfaction = log.satisfaction;
            }
          });

          return baseData;
        }, [logs]);

        return (
          <div className="glass-card">
            <h2 className="section-title">
              <Icons.Activity size={22} />
              睡眠ログ & 実績統計
            </h2>

            <div className="graph-container">
              <div style={{ fontSize: '0.8rem', color: 'var(--text-sub)', marginBottom: '10px' }}>
                直近7日間の睡眠時間 (h)
              </div>
              <svg className="interactive-graph" viewBox="0 0 400 200">
                <defs>
                  <linearGradient id="graphGradient" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stopColor="var(--accent-secondary)" />
                    <stop offset="100%" stopColor="rgba(6, 182, 212, 0.1)" />
                  </linearGradient>
                  <linearGradient id="graphGradientHover" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stopColor="var(--accent-highlight)" />
                    <stop offset="100%" stopColor="rgba(236, 72, 153, 0.2)" />
                  </linearGradient>
                </defs>

                <line x1="30" y1="30" x2="380" y2="30" className="graph-grid" />
                <line x1="30" y1="80" x2="380" y2="80" className="graph-grid" />
                <line x1="30" y1="130" x2="380" y2="130" className="graph-grid" />
                <line x1="30" y1="170" x2="380" y2="170" className="graph-grid" style={{ strokeWidth: 1.5 }} />

                {graphData.map((d, i) => {
                  const x = 45 + i * 48;
                  const maxVal = 10;
                  const barHeight = Math.min((d.duration / maxVal) * 140, 140);
                  const y = 170 - barHeight;

                  return (
                    <g key={i}>
                      <rect 
                        x={x} 
                        y={y} 
                        width="24" 
                        height={barHeight} 
                        className="graph-bar"
                      />
                      {d.duration > 0 && (
                        <text x={x + 12} y={y - 6} className="graph-val">{d.duration}</text>
                      )}
                      <text x={x + 12} y="188" className="graph-text">{d.date}</text>
                    </g>
                  );
                })}
              </svg>
            </div>

            <form onSubmit={handleAdd} style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(110px, 1fr))', gap: '12px', marginBottom: '24px' }}>
              <div className="input-group" style={{ marginBottom: 0 }}>
                <label className="input-label" style={{ fontSize: '0.75rem' }}>昨夜の就寝</label>
                <input type="time" value={sleepTime} onChange={e => setSleepTime(e.target.value)} className="input-field" style={{ padding: '8px 12px' }} />
              </div>

              <div className="input-group" style={{ marginBottom: 0 }}>
                <label className="input-label" style={{ fontSize: '0.75rem' }}>今朝の起床</label>
                <input type="time" value={wakeTime} onChange={e => setWakeTime(e.target.value)} className="input-field" style={{ padding: '8px 12px' }} />
              </div>

              <div className="input-group" style={{ marginBottom: 0 }}>
                <label className="input-label" style={{ fontSize: '0.75rem' }}>スッキリ度 ({satisfaction}%)</label>
                <input type="range" min="20" max="100" step="10" value={satisfaction} onChange={e => setSatisfaction(parseInt(e.target.value))} className="range-slider" style={{ marginTop: '10px' }} />
              </div>

              <button type="submit" className="btn-primary" style={{ padding: '8px 12px', marginTop: '22px', fontSize: '0.9rem' }}>
                記録
              </button>
            </form>

            <div className="logs-list">
              {logs.length === 0 ? (
                <div style={{ textAlign: 'center', color: 'var(--text-muted)', fontSize: '0.85rem', padding: '20px 0' }}>
                  睡眠ログがまだありません。昨日の実績から記録してみましょう。
                </div>
              ) : (
                logs.slice().reverse().map(l => (
                  <div key={l.id} className="log-item">
                    <div>
                      <strong style={{ fontSize: '0.95rem' }}>{l.date}</strong>
                      <div style={{ fontSize: '0.8rem', color: 'var(--text-sub)' }}>
                        {l.sleepTime} 〜 {l.wakeTime} (<strong>{l.duration}h</strong>)
                      </div>
                    </div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: '14px' }}>
                      <span style={{ fontSize: '0.8rem', background: 'rgba(255,255,255,0.05)', padding: '2px 8px', borderRadius: '20px' }}>
                        すっきり: {l.satisfaction}%
                      </span>
                      <button 
                        onClick={() => onDeleteLog(l.id)} 
                        style={{ 
                          background: 'transparent', 
                          border: 'none', 
                          color: 'var(--accent-danger)', 
                          cursor: 'pointer',
                          padding: '4px'
                        }}
                      >
                        <Icons.Trash2 size={15} />
                      </button>
                    </div>
                  </div>
                ))
              )}
            </div>
          </div>
        );
      }

      // --- 9. MAIN APP COMPONENT ---
      function App() {
        const [activeTab, setActiveTab] = useState('sim');
        const [wakeUpTime, setWakeUpTime] = useState('07:00');
        const [sleepDuration, setSleepDuration] = useState(7.5);
        const [bonusScore, setBonusScore] = useState(0);

        const [chronotype, setChronotype] = useState(() => {
          return localStorage.getItem('somnus_chronotype') || 'bear';
        });

        const [weeklyData, setWeeklyData] = useState(() => {
          const saved = localStorage.getItem('somnus_weekly');
          if (saved) return JSON.parse(saved);
          return Array(7).fill(null).map(() => ({
            wakeUpTime: '07:00',
            sleepDuration: 7.5
          }));
        });

        const [activeDay, setActiveDay] = useState(new Date().getDay() === 0 ? 6 : new Date().getDay() - 1);

        const [logs, setLogs] = useState(() => {
          const saved = localStorage.getItem('somnus_logs');
          if (saved) return JSON.parse(saved);
          return [
            { id: 'demo-1', date: '06/01', sleepTime: '23:30', wakeTime: '07:00', duration: 7.5, satisfaction: 90 },
            { id: 'demo-2', date: '06/02', sleepTime: '00:00', wakeTime: '06:30', duration: 6.5, satisfaction: 70 }
          ];
        });

        useEffect(() => {
          localStorage.setItem('somnus_chronotype', chronotype);
        }, [chronotype]);

        useEffect(() => {
          localStorage.setItem('somnus_weekly', JSON.stringify(weeklyData));
        }, [weeklyData]);

        useEffect(() => {
          localStorage.setItem('somnus_logs', JSON.stringify(logs));
        }, [logs]);

        useEffect(() => {
          const daySettings = weeklyData[activeDay];
          if (daySettings) {
            setWakeUpTime(daySettings.wakeUpTime);
            setSleepDuration(daySettings.sleepDuration);
          }
        }, [activeDay]);

        const handleUpdateDayData = (dayIdx, updatedFields) => {
          setWeeklyData(prev => prev.map((day, idx) => {
            if (idx === dayIdx) {
              return { ...day, ...updatedFields };
            }
            return day;
          }));
        };

        const handleAddLog = (newLog) => {
          setLogs(prev => [...prev, newLog]);
        };

        const handleDeleteLog = (id) => {
          setLogs(prev => prev.filter(l => l.id !== id));
        };

        const sleepScore = useMemo(() => {
          const base = (sleepDuration / 7.5) * 100;
          const score = Math.round(base + bonusScore);
          return Math.min(Math.max(score, 20), 100);
        }, [sleepDuration, bonusScore]);

        const calculatedBedtime = useMemo(() => {
          const wakeMin = timeToMinutes(wakeUpTime);
          const sleepMin = sleepDuration * 60;
          const fallAsleepMin = 15;
          const bedtimeMin = wakeMin - sleepMin - fallAsleepMin;
          return minutesToTime(bedtimeMin);
        }, [wakeUpTime, sleepDuration]);

        return (
          <div className="app-container">
            <header>
              <div className="brand">
                <div className="brand-logo">
                  <Icons.Moon size={24} style={{ color: '#fff' }} />
                </div>
                <h1>Somnus V3</h1>
              </div>
              <p className="subtitle">
                睡眠サイクル可視化・AIコーチング・環境音プレイヤーを搭載したパーソナル睡眠最適化エンジン
              </p>
            </header>

            <div className="user-status-strip">
              <div className="status-pill">
                クロノタイプ: <strong>{CHRONOTYPES[chronotype]?.name} {CHRONOTYPES[chronotype]?.emoji}</strong>
              </div>
              <div className="status-pill">
                今夜の推奨就寝: <strong style={{ color: 'var(--accent-secondary)' }}>{calculatedBedtime}</strong>
              </div>
              <div className="status-pill">
                目標睡眠: <strong>{sleepDuration}h</strong>
              </div>
            </div>

            <div className="nav-tabs">
              <button 
                onClick={() => setActiveTab('sim')} 
                className={`tab-btn ${activeTab === 'sim' ? 'active' : ''}`}
              >
                <Icons.Moon size={16} />
                就寝シミュレーター
              </button>
              <button 
                onClick={() => setActiveTab('week')} 
                className={`tab-btn ${activeTab === 'week' ? 'active' : ''}`}
              >
                <Icons.Calendar size={16} />
                週間プランナー
              </button>
              <button 
                onClick={() => setActiveTab('quiz')} 
                className={`tab-btn ${activeTab === 'quiz' ? 'active' : ''}`}
              >
                <Icons.User size={16} />
                クロノタイプ診断
              </button>
              <button 
                onClick={() => setActiveTab('logs')} 
                className={`tab-btn ${activeTab === 'logs' ? 'active' : ''}`}
              >
                <Icons.Activity size={16} />
                睡眠ログ & 統計
              </button>
            </div>

            <main>
              {activeTab === 'sim' && (
                <div className="main-grid">
                  <div style={{ display: 'flex', flexDirection: 'column', gap: '28px' }}>
                    
                    <div className="glass-card">
                      <h2 className="section-title">
                        <Icons.Clock size={22} />
                        就寝シミュレーター
                      </h2>
                      
                      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '20px', marginBottom: '24px' }}>
                        <div className="input-group">
                          <label className="input-label">希望起床時間</label>
                          <input 
                            type="time" 
                            value={wakeUpTime} 
                            onChange={e => setWakeUpTime(e.target.value)} 
                            className="input-field" 
                          />
                        </div>

                        <div className="input-group">
                          <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                            <label className="input-label">目標睡眠時間</label>
                            <span style={{ fontSize: '0.85rem', fontWeight: 'bold' }}>{sleepDuration}h</span>
                          </div>
                          <input 
                            type="range" 
                            min="5.0" 
                            max="9.5" 
                            step="0.5" 
                            value={sleepDuration} 
                            onChange={e => setSleepDuration(parseFloat(e.target.value))} 
                            className="range-slider" 
                            style={{ marginTop: '14px' }}
                          />
                        </div>
                      </div>

                      <div style={{ 
                        background: 'linear-gradient(135deg, rgba(139, 92, 246, 0.1) 0%, rgba(6, 182, 212, 0.05) 100%)',
                        border: '1px solid rgba(139, 92, 246, 0.25)', 
                        borderRadius: '16px', 
                        padding: '24px', 
                        textAlign: 'center' 
                      }}>
                        <div style={{ fontSize: '0.9rem', color: 'var(--text-sub)', textTransform: 'uppercase', letterSpacing: '0.05em' }}>推奨就寝時刻</div>
                        <div style={{ fontSize: '3rem', fontWeight: '800', margin: '5px 0', textShadow: '0 0 15px rgba(139,92,246,0.3)' }}>
                          {calculatedBedtime} <span style={{ fontSize: '1.1rem', color: 'var(--text-sub)' }}>までに</span>
                        </div>
                        <p style={{ fontSize: '0.9rem', color: 'var(--text-sub)' }}>
                          就寝予定の15分前から寝る準備を開始し、脳をリラックスモードに導いてください。
                        </p>
                      </div>

                      <SleepCycleVisualizer 
                        wakeUpTime={wakeUpTime} 
                        bedtime={calculatedBedtime} 
                        sleepDuration={sleepDuration} 
                      />

                      <BiorhythmTimeline chronotype={chronotype} />
                    </div>

                    <SleepRoutine 
                      bedtime={calculatedBedtime} 
                      onAddBonusScore={points => setBonusScore(prev => prev + points)} 
                    />
                  </div>

                  <div style={{ display: 'flex', flexDirection: 'column', gap: '28px' }}>
                    <div className="glass-card">
                      <h2 className="section-title">
                        <Icons.Sparkles size={22} />
                        睡眠スコア & 分析
                      </h2>
                      
                      <div style={{ display: 'flex', justifyContent: 'center', marginBottom: '20px' }}>
                        <div style={{ position: 'relative', width: '130px', height: '130px' }}>
                          <svg style={{ transform: 'rotate(-90deg)', width: '100%', height: '100%' }}>
                            <circle cx="65" cy="65" r="54" stroke="rgba(255,255,255,0.05)" strokeWidth="8" fill="none" />
                            <circle 
                              cx="65" 
                              cy="65" 
                              r="54" 
                              stroke="var(--accent-primary)" 
                              strokeWidth="8" 
                              fill="none" 
                              strokeDasharray="339.3"
                              strokeDashoffset={339.3 - (sleepScore / 100) * 339.3}
                              strokeLinecap="round"
                              style={{ transition: 'stroke-dashoffset 0.6s ease' }}
                            />
                          </svg>
                          <div style={{ position: 'absolute', top: '50%', left: '50%', transform: 'translate(-50%, -50%)', textAlign: 'center' }}>
                            <div style={{ fontSize: '2rem', fontWeight: '800' }}>{sleepScore}</div>
                            <div style={{ fontSize: '0.75rem', color: 'var(--text-sub)' }}>SCORE</div>
                          </div>
                        </div>
                      </div>

                      <div style={{ background: 'rgba(255,255,255,0.02)', padding: '14px', borderRadius: '12px', marginBottom: '14px' }}>
                        <div style={{ fontSize: '0.85rem', color: 'var(--text-sub)' }}>診断に基づくパーソナライズ傾向</div>
                        <div style={{ fontSize: '0.95rem', fontWeight: 'bold', marginTop: '4px' }}>
                          {CHRONOTYPES[chronotype]?.name} の理想睡眠時間は {CHRONOTYPES[chronotype]?.idealSleep}h です。
                        </div>
                      </div>

                      <div className={`sleep-alert ${sleepScore >= 80 ? 'success' : sleepScore >= 60 ? 'info' : 'warning'}`}>
                        <Icons.Info size={20} style={{ flexShrink: 0, marginTop: '2px' }} />
                        <span>
                          {sleepScore >= 85 
                            ? '素晴らしい！目標睡眠サイクルが完全に確保されており、就寝前ルーティンの準備も万全です。' 
                            : sleepScore >= 70 
                              ? '良好な目標設計です。就寝前ルーティンを追加で完了させると、さらに目覚めが良くなります。' 
                              : '睡眠時間が少し短いか、ルーティンが不足しています。すっきり起きてパフォーマンスを最大化させるために改善を検討しましょう。'}
                        </span>
                      </div>
                    </div>

                    <AISleepCoach 
                      logs={logs} 
                      weeklyData={weeklyData} 
                      chronotype={chronotype} 
                    />

                    <AmbientSoundGenerator />
                  </div>
                </div>
              )}

              {activeTab === 'week' && (
                <div className="single-column">
                  <WeeklyPlanner 
                    weeklyData={weeklyData} 
                    activeDay={activeDay}
                    onSetActiveDay={setActiveDay}
                    onUpdateDayData={handleUpdateDayData}
                    chronotype={chronotype}
                  />
                </div>
              )}

              {activeTab === 'quiz' && (
                <div className="single-column">
                  <ChronotypeQuiz 
                    userChronotype={chronotype} 
                    onSetChronotype={setChronotype} 
                  />
                </div>
              )}

              {activeTab === 'logs' && (
                <div className="single-column">
                  <SleepLogs 
                    logs={logs} 
                    onAddLog={handleAddLog} 
                    onDeleteLog={handleDeleteLog} 
                  />
                </div>
              )}
            </main>

            <footer>
              <p>
                &copy; {new Date().getFullYear()} Somnus V3 - 睡眠習慣最適化プランナー.
                Powered by React & Web Audio API. 科学的なアプローチで睡眠をコントロール。
              </p>
            </footer>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
